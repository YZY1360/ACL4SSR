name: Trigger MRS Conversion

on:
  push:
    branches: [master]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AutoConvertACL4SSR2MRS
        run: |
          set -e
          RESP=$(curl -w '\n%{http_code}' -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/YZY1360/AutoConvertACL4SSR2MRS/actions/workflows/convert.yml/dispatches" \
            -d '{"ref":"main"}')
          HTTP_CODE=$(echo "$RESP" | tail -1)
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "204" ]; then
            echo "ERROR: unexpected status"
            echo "$RESP"
            exit 1
          fi
